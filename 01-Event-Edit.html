    }

        width: 150px;
        font-weight: bold;
    }

    input,

        flex: 1;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 3px;
        width: 100%;
        min-width: 0;
    }

    button {
        padding: 10px;

        border-radius: 5px;
        background-color: maroon;
        color: white;
        cursor: pointer;
    }

    /* Desktop Table */
table {
    width: 100%;

}

table th,
table td {

table th {

/* Mobile Card Layout */
@media screen and (max-width: 768px) {

    #eventTable,

#eventTable td:nth-child(1):before {
    width: 20%;
}

#eventTable td:nth-child(1) {
    padding-left: 25%;
}

    #eventTable tr {

        color: black;
        padding: 10px;
    }

    #eventTable td {
        border: none;
        border-bottom: 1px solid #ddd;
        position: relative;
padding: 6px 6px 6px 38%;
        text-align: left;
        min-height: 30px;
        word-break: break-word;
    }

    #eventTable td:last-child {
        border-bottom: none;
    }

    #eventTable td:before {
        position: absolute;
        left: 10px;
        width: 40%;
        font-weight: bold;
        white-space: nowrap;
    }

    #eventTable td:nth-child(1):before { content: "S.No"; }
    #eventTable td:nth-child(2):before { content: "Occasion"; }
    #eventTable td:nth-child(3):before { content: "From Name"; }

    #eventTable td:nth-child(5):before { content: "From Mobile"; }

    #eventTable td:nth-child(14):before { content: "Actions"; }

    #eventTable td button {

}
    #messageArea {

        color: green;

        async function getNextSNo() {
            const eventCollection = collection(db, "Event");

const snapshot = await getDocs(q);

if (snapshot.empty) return 1;

const last = snapshot.docs[snapshot.docs.length - 1].data().SNo || 0;
return Number(last) + 1;

            const lastSNo = snapshot.docs[0].data().SNo || 0;
            return Number(lastSNo) + 1;
        }

        async function setNextSNo() {

        // Function to get all events
        async function getEvent() {
            const eventList = document.getElementById("eventList");
            eventList.innerHTML = "";

            const eventCollection = collection(db, "Event");
            try {
                const snapshot = await getDocs(eventCollection);
                if (snapshot.empty) {
                    eventList.innerHTML = "<tr><td colspan='13'>No Events found.</td></tr>";
                } else {
                    const sortedDocs = snapshot.docs.sort((a, b) => {
                        const eventA = a.data();
                        const eventB = b.data();
                        return eventA.SNo - eventB.SNo; // Ascending order of SNo
                    });

                    sortedDocs.forEach(doc => {
                        const eventData = doc.data();
                        const row = document.createElement("tr");

                        row.innerHTML = `

                                    <td>${eventData.SNo}</td>
                                    <td>${eventData.Occasion}</td>
                                    <td>${eventData.From_Name}</td>
                                    <td>${eventData.From_Email}</td>
                                    <td>${eventData.From_Mobile}</td>
                                    <td>${eventData.To_Name}</td>
                                    <td>${eventData.To_Gname}</td>
                                    <td>${eventData.To_Email}</td>
                                    <td>${eventData.To_Mobile}</td>
                                    <td>${eventData.Relation}</td>
                                    <td>${eventData.Recurring}</td>
                                    <td>${eventData.Reminder_Message}</td>
                                    <td>${eventData.Date}</td>
                                    <td>
                                        <button onclick="editEvent('${doc.id}', '${encodeURIComponent(JSON.stringify(eventData))}')">Edit</button>
                                        <button onclick="deleteEvent('${doc.id}')">Delete</button>
                                    </td>
                                `;
                        eventList.appendChild(row);
                    });
                }
            } catch (error) {
                console.error("Error getting events:", error);
                eventList.innerHTML = "<tr><td colspan='13'>Error loading Events.</td></tr>";
            }
        }

        // Check for duplicate Serial Number
        async function checkDuplicateSNo(sno1) {
            const eventCollection = collection(db, "Event");
            const q = query(eventCollection, where("SNo", "==", sno1));
            const querySnapshot = await getDocs(q);
            return !querySnapshot.empty; // returns true if SNo exists
        }

        document.getElementById('editForm').addEventListener('submit', async function (event) {

    function getTodayLocalDate() {
    const d = new Date();
    const year = d.getFullYear();
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
}

    document.getElementById("Date").value = getTodayLocalDate();

    await setNextSNo();

    document.getElementById("Occasion").focus();
}

                } catch (error) {
                    console.error("Error deleting event:", error);
                    showMessage("Error deleting Event.", "red");
                }
            }
        };

        // Initialize by fetching events
getEvent();
setNextSNo();
document.getElementById('Date').value = getTodayLocalDate();

window.addEventListener("DOMContentLoaded", async () => {
    document.getElementById("Date").value = getTodayLocalDate();

    await getEvent();
    await setNextSNo();

    document.getElementById("Occasion").focus();
});
