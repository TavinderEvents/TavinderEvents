<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upcoming Events</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }

        .container {
            padding: 10px;
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .section-title {
            background: maroon;
            color: white;
            padding: 12px;
            margin-top: 20px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
        }

        /* TABLE WRAPPER */
        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 10px;
            background: white;
            border-radius: 6px;
        }

        /* TABLE */
        table {
            width: 100%;
            min-width: 700px;
            border-collapse: collapse;
            background: white;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            white-space: nowrap;
            font-size: 14px;
        }

        th {
            background-color: #6c0202;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #333;
            margin-top: 20px;
        }

        footer button {
            padding: 10px 20px;
            border: none;
            background: maroon;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        /* MOBILE */
        @media screen and (max-width: 768px) {

            h1 {
                font-size: 22px;
            }

            .section-title {
                font-size: 16px;
                padding: 10px;
            }

            th,
            td {
                padding: 8px;
                font-size: 12px;
            }

            footer button {
                width: 100%;
                max-width: 250px;
            }
        }

        /* EXTRA SMALL DEVICES */
        @media screen and (max-width: 480px) {

            .container {
                padding: 5px;
            }

            h1 {
                font-size: 20px;
            }

            th,
            td {
                font-size: 11px;
                padding: 6px;
            }

            .section-title {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Upcoming Events</h1>

    <!-- NEXT 7 DAYS -->
    <div class="section-title">
        Upcoming in Next 7 Days
    </div>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>Serial</th>
                <th>From</th>
                <th>To</th>
                <th>Email</th>
                <th>Occasion</th>
                <th>Date</th>
                <th>Days Left</th>
            </tr>
            </thead>

            <tbody id="event7Days"></tbody>
        </table>
    </div>

    <!-- NEXT 30 DAYS -->
    <div class="section-title">
        Upcoming in Next 30 Days
    </div>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>Serial</th>
                <th>From</th>
                <th>To</th>
                <th>Email</th>
                <th>Occasion</th>
                <th>Date</th>
                <th>Days Left</th>
            </tr>
            </thead>

            <tbody id="event30Days"></tbody>
        </table>
    </div>

    <!-- NEXT 90 DAYS -->
    <div class="section-title">
        Upcoming in Next 90 Days
    </div>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>Serial</th>
                <th>From</th>
                <th>To</th>
                <th>Email</th>
                <th>Occasion</th>
                <th>Date</th>
                <th>Days Left</th>
            </tr>
            </thead>

            <tbody id="event90Days"></tbody>
        </table>
    </div>

</div>

<footer>
    <a href="index.html">
        <button>Back</button>
    </a>
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDAHhKZEFIm4Z1HyTRGCaqJ1NGC7KelQ38",
    authDomain: "tavinderevents.firebaseapp.com",
    projectId: "tavinderevents",
    storageBucket: "tavinderevents.firebasestorage.app",
    messagingSenderId: "62017081718",
    appId: "1:62017081718:web:503ed1151d3235f719aa57",
    measurementId: "G-7RYTW534N1"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

function formatDate(dateString) {

    if (!dateString) return "";

    const d = new Date(dateString);

    if (isNaN(d)) return dateString;

    return d.toLocaleDateString("en-GB", {
        day: "2-digit",
        month: "short",
        year: "numeric"
    });
}

function addRow(tableId, event, daysLeft) {

    const table = document.getElementById(tableId);

    const row = document.createElement("tr");

    row.innerHTML = `
        <td>${event.SNo || ""}</td>
        <td>${event.From_Name || ""}</td>
        <td>${event.To_Name || ""}</td>
        <td>${event.To_Email || ""}</td>
        <td>${event.Occasion || ""}</td>
        <td>${formatDate(event.Date)}</td>
        <td>${daysLeft}</td>
    `;

    table.appendChild(row);
}

async function loadUpcomingEvents() {

    try {

        const snapshot = await getDocs(collection(db, "Event"));

        const today = new Date();

        today.setHours(0,0,0,0);

        const events = snapshot.docs.map(doc => doc.data());

        // SORT BY UPCOMING DAYS
        const processedEvents = [];

        events.forEach(event => {

            if (!event.Date) return;

            const eventDate = new Date(event.Date);

            if (isNaN(eventDate)) return;

            eventDate.setHours(0,0,0,0);

            const currentYear = today.getFullYear();

            eventDate.setFullYear(currentYear);

            // MOVE PAST EVENTS TO NEXT YEAR
            if (eventDate < today) {
                eventDate.setFullYear(currentYear + 1);
            }

            const diffTime = eventDate - today;

            const daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            processedEvents.push({
                event,
                daysLeft
            });
        });

        // SORT ASCENDING
        processedEvents.sort((a, b) => a.daysLeft - b.daysLeft);

        processedEvents.forEach(item => {

            const event = item.event;
            const daysLeft = item.daysLeft;

            // NEXT 7 DAYS
            if (daysLeft >= 0 && daysLeft <= 7) {
                addRow("event7Days", event, daysLeft);
            }

            // NEXT 30 DAYS
            if (daysLeft > 7 && daysLeft <= 30) {
                addRow("event30Days", event, daysLeft);
            }

            // NEXT 90 DAYS
            if (daysLeft > 30 && daysLeft <= 90) {
                addRow("event90Days", event, daysLeft);
            }
        });

    } catch (error) {

        console.error("Error loading events:", error);

    }
}

loadUpcomingEvents();

</script>

</body>
</html>
