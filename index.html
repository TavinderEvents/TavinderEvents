<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Planner</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f4;
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        }

        button {
            width: 100%;
            background-color: #5a0404;
            color: white;
            padding: 12px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #45a049;
        }

        .message {
            margin-top: 15px;
            font-size: 16px;
        }

        #loadingSpinner {
            display: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Event Planner</h2>

        <div id="loadingSpinner">Loading...</div>
        <div id="messageArea" class="message"></div>

        <button onclick="AddEventsButton()">Add Event</button>
        <button onclick="ModifytableButton()">Modify Table</button>
        <button onclick="ListData()">List Data</button>
        <button onclick="UpcomingEvents()">Check Upcoming Events</button>
        <button onclick="checkAndSendEmails()">Check Today's Events</button>
    </div>

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script>
        function AddEventsButton() {
            window.open('01-Event-Edit.html');
        }

        function ModifytableButton() {
            window.open('02-Event-Table-Edit.html');
        }

        function ListData() {
            window.open('03-Event-List.html');
        }
        function UpcomingEvents() {
            window.open('04-Upcoming-Events.html');
        }
    </script>

    <!-- Firebase + Main Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

        const firebaseConfig = {
            // apiKey: "YOUR_API_KEY",
            // authDomain: "jwdatabase-f0e20.firebaseapp.com",
            // projectId: "jwdatabase-f0e20"
            apiKey: "AIzaSyDAHhKZEFIm4Z1HyTRGCaqJ1NGC7KelQ38",
            authDomain: "tavinderevents.firebaseapp.com",
            projectId: "tavinderevents"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const content = await fetch('./shared/eventContent.json')
            .then(response => response.json());

        const BirthdayMessages = content.Birthday.messages;
        const BirthdayImageLinks = content.Birthday.images;

        const AnniversaryMessages = content.Anniversary.messages;
        const AnniversaryImageLinks = content.Anniversary.images;

        const ReminderImage = content.Reminder.image;


        // Initialize EmailJS
        // tpsarora@gmail.com Lal@7277
        emailjs.init("UUiVKSDERxZLzZndq");

        async function checkAndSendEmails() {
            const spinner = document.getElementById('loadingSpinner');
            const msg = document.getElementById('messageArea');

            spinner.style.display = 'block';
            msg.innerHTML = "";

            try {
                const today = new Date().toISOString().split('T')[0];

                const querySnapshot = await getDocs(collection(db, "Event"));

                let found = false;
                let sentIds = new Set();

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const key = data.Occasion + "_" + data.To_Email;


                    const formattedDate = new Date(data.Date).toLocaleDateString('en-GB', {
                        day: '2-digit',
                        month: 'short',
                        year: 'numeric'
                    }).replace(/ /g, '-');


                    if (sentIds.has(key)) return;

                    sentIds.add(key);
                    if (data.Date === today) {
                        found = true;

                        let subject = "";
                        let message = "";
                        let link = "";
                        if (data.Occasion === "Birthday") {
                            const RandomBirthdayMessage = BirthdayMessages[Math.floor(Math.random() * BirthdayMessages.length)];
                            const BirthdayRandomLink = BirthdayImageLinks[Math.floor(Math.random() * BirthdayImageLinks.length)];

                            subject = `Happy Birthday - ${data.To_Name} - ${formattedDate}`;
                            message = RandomBirthdayMessage;
                            link = BirthdayRandomLink;

                        }

                        else if (data.Occasion === "Anniversary") {
                            const RandomAnniversaryMessage = AnniversaryMessages[Math.floor(Math.random() * AnniversaryMessages.length)];
                            const AnniversaryRandomLink = AnniversaryImageLinks[Math.floor(Math.random() * AnniversaryImageLinks.length)];
                            subject = `Happy Anniversary ${data.To_Name} - ${formattedDate}`;
                            message = RandomAnniversaryMessage;
                            link = AnniversaryRandomLink;
                        }
                        // else if (data.Occasion === "Reminder-Self") {
                        //         console.log("Reminder-Self matched");
                        //         console.log("Occasion =", `"${data.Occasion}"`);
                        //     subject = `Self Reminder ${data.Reminder_Message} - ${formattedDate}`;
                        //     message = `Self Reminder ${data.Reminder_Message} - ${formattedDate}`;
                        //     link = ReminderImage;
                        // }
                        else if (data.Occasion === "Reminder-Self") {
                            subject = `Reminder ${data.To_Name} - ${formattedDate}`;
                            message = `Reminder Message: ${data.Reminder_Message}`;
                            link = ReminderImage;
                        }

                        else if (data.Occasion === "Reminder") {
                            subject = `Reminder ${data.To_Name} - ${formattedDate}`;
                            message = `Reminder Message: ${data.Reminder_Message}`;
                            link = ReminderImage;
                        }

                        else if (data.Occasion === "Reminder-Birthday") {
                            subject = `Reminder-Birthday ${data.To_Name} - ${formattedDate}`;
                            message = `Birthday Wishes for ${data.To_Name} - ${formattedDate}`;
                            link = ReminderImage;
                        }

                        else if (data.Occasion === "Reminder-Anniversary") {
                            subject = `Reminder-Anniversary ${data.To_Name} - ${formattedDate}`;
                            message = `Anniversary Wishes for ${data.To_Name} - ${formattedDate}`;
                            link = ReminderImage;
                        }

                        sendEmail(data.To_Email, subject, message, data.To_Gname, link);
                    }
                });

                if (!found) {
                    msg.innerHTML = "No events today.";
                } else {
                    msg.innerHTML = "Emails sent successfully!";
                    msg.style.color = "green";
                }

            } catch (error) {
                console.error(error);
                msg.innerHTML = "Error occurred.";
                msg.style.color = "red";
            }

            spinner.style.display = 'none';
        }


        function sendEmail(toEmail, subject, message, name, link) {
            emailjs.send("service_jitwsrj", "template_8wpg95p", {
                to_name: name,
                subject: subject,
                message: message,
                email: toEmail,
                link: link
            })
                .then(res => console.log("Email sent", res))
                .catch(err => console.error("Error", err));
        }

        // Make function global
        window.checkAndSendEmails = checkAndSendEmails;

    </script>

</body>

</html>
